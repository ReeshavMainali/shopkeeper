{% extends "base.html" %}
{% block title %} · Open Tab{% endblock %}
{% block page_title %}Open a Tab{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('tabs') }}" class="btn btn-secondary">← Back</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width:500px">
  <div class="card-header"><h3>Tab Details</h3>
    <span style="font-size:0.78rem;color:var(--muted)">Item taken now, paid later</span>
  </div>
  <div class="card-body">
    <form method="post">
      <div class="form-grid">
        <div class="form-group full">
          <label>Customer *</label>
          <select name="customer_id" required>
            <option value="">Select customer…</option>
            {% for c in customers %}
            <option value="{{ c.id }}">{{ c.name }} {% if c.phone %}({{ c.phone }}){% endif %}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group full">
          <label>Product *</label>
          <select name="product_id" required onchange="fillPrice(this)">
            <option value="">Select product…</option>
            {% for p in products %}
            <option value="{{ p.id }}" data-price="{{ p.price }}" data-name="{{ p.name }}">{{ p.name }} — Rs {{ "%.0f"|format(p.price) }} ({{ p.stock }} left)</option>
            {% endfor %}
          </select>
          <input type="hidden" name="product_name" id="product-name-hidden">
        </div>
        <div class="form-group">
          <label>Qty *</label>
          <input name="qty" type="number" min="1" value="1" required>
        </div>
        <div class="form-group">
          <label>Price (Rs) *</label>
          <input name="price" type="number" step="0.01" id="price-input" required placeholder="0.00">
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Open Tab</button>
        <a href="{{ url_for('tabs') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script>
function fillPrice(sel) {
  const opt = sel.options[sel.selectedIndex];
  if (opt.dataset.price) {
    document.getElementById('price-input').value = opt.dataset.price;
    document.getElementById('product-name-hidden').value = opt.dataset.name;
  }
}
</script>
{% endblock %}
