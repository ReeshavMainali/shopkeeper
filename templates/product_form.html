{% extends "base.html" %}
{% block title %} · {{ 'Edit' if product else 'Add' }} Product{% endblock %}
{% block page_title %}{{ 'Edit' if product else 'Add' }} Product{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('products') }}" class="btn btn-secondary">← Back</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width:700px">
  <div class="card-header"><h3>Product Details</h3></div>
  <div class="card-body">
    <form method="post">
      <div class="form-grid">
        <div class="form-group full">
          <label>Product Name *</label>
          <input name="name" required value="{{ product.name if product else '' }}" placeholder="e.g. Wai Wai Noodles">
        </div>
        <div class="form-group">
          <label>SKU / Barcode</label>
          <input name="sku" value="{{ product.sku if product else '' }}" placeholder="e.g. WW-001">
        </div>
        <div class="form-group">
          <label>Category</label>
          <input name="category" value="{{ product.category if product else '' }}" placeholder="e.g. Food, Drinks, Electronics">
        </div>
        <div class="form-group">
          <label>Selling Price (Rs) *</label>
          <input name="price" type="number" step="0.01" required value="{{ product.price if product else '' }}" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Cost Price (Rs)</label>
          <input name="cost" type="number" step="0.01" value="{{ product.cost if product else '' }}" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Current Stock *</label>
          <input name="stock" type="number" required value="{{ product.stock if product else '0' }}" placeholder="0">
        </div>
        <div class="form-group">
          <label>Low Stock Threshold</label>
          <input name="low_stock_threshold" type="number" value="{{ product.low_stock_threshold if product else '5' }}" placeholder="5">
        </div>
        <div class="form-group">
          <label>Unit</label>
          <select name="unit">
            {% for u in ['pcs','kg','g','L','mL','dozen','box','pack','bottle','bag'] %}
              <option value="{{ u }}" {{ 'selected' if product and product.unit==u else '' }}>{{ u }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ 'Update' if product else 'Add' }} Product</button>
        <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
